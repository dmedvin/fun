<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Games</title>
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-FTQ4W87FCQ"></script>
  <script>window.dataLayer=window.dataLayer||[];function gtag(){dataLayer.push(arguments);}gtag('js',new Date());gtag('config','G-FTQ4W87FCQ');</script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      min-height: 100vh;
      background: #0d0d1a;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-family: 'Segoe UI', Arial, sans-serif;
      padding: 40px 20px;
      gap: 24px;
    }

    h1 {
      color: #fff;
      font-size: clamp(1.6rem, 5vw, 2.4rem);
      font-weight: 800;
      letter-spacing: 0.04em;
      opacity: 0.85;
    }

    .grid {
      display: flex;
      flex-wrap: wrap;
      gap: 28px;
      justify-content: center;
    }

    .tile {
      position: relative;
      width: 300px;
      height: 220px;
      border-radius: 20px;
      overflow: hidden;
      cursor: pointer;
      text-decoration: none;
      box-shadow: 0 8px 32px rgba(0,0,0,0.5);
      transition: transform 0.18s, box-shadow 0.18s;
    }

    .tile:hover {
      transform: translateY(-6px) scale(1.02);
      box-shadow: 0 18px 48px rgba(0,0,0,0.6);
    }

    .tile:active {
      transform: scale(0.97);
    }

    /* Background layer — image or iframe */
    .tile-bg {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      border: none;
      pointer-events: none;
    }

    .tile-bg-img {
      object-fit: cover;
    }

    /* Dark gradient overlay so text is always readable */
    .tile-overlay {
      position: absolute;
      inset: 0;
      background: linear-gradient(
        to top,
        rgba(0,0,0,0.78) 0%,
        rgba(0,0,0,0.25) 55%,
        rgba(0,0,0,0.10) 100%
      );
    }

    /* Text pinned to bottom */
    .tile-info {
      position: absolute;
      bottom: 0;
      left: 0; right: 0;
      padding: 16px 20px;
      color: #fff;
    }

    .tile-title {
      font-size: 1.35rem;
      font-weight: 800;
      letter-spacing: 0.02em;
      line-height: 1.2;
    }

    .tile-desc {
      font-size: 0.82rem;
      opacity: 0.75;
      margin-top: 4px;
      line-height: 1.4;
    }
  </style>
</head>
<body>

<h1>🎮 Games</h1>

<div class="grid">

  <!-- six7 -->
  <a class="tile" href="six7/index.html">
    <iframe class="tile-bg" src="effect.html" scrolling="no" tabindex="-1"></iframe>
    <div class="tile-overlay"></div>
    <div class="tile-info">
      <div class="tile-title">67</div>
      <div class="tile-desc">Pick numbers &amp; operators to make 67 — no cap 🔥</div>
    </div>
  </a>

  <!-- northPinyin -->
  <a class="tile" href="northPinyin/index.html">
    <img class="tile-bg tile-bg-img" src="pinyin.png" alt="Pinyin">
    <div class="tile-overlay"></div>
    <div class="tile-info">
      <div class="tile-title">🎈 Balloon Pop</div>
      <div class="tile-desc">Pop the balloon with the right Chinese meaning</div>
    </div>
  </a>

</div>

</body>
</html>
