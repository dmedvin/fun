ustify-content:center;}.win-title{color:#6bcb77;}.fail-title{color:#ff6b6b;}#confetti-canvas{position:fixed;inset:0;pointer-events:none;z-index:199;}@keyframes titlePulse{0%,100%{filter:drop-shadow(0 0 30px rgba(255,150,50,0.4));}50%{filter:drop-shadow(0 0 50px rgba(100,200,255,0.5));}}@keyframes popIn{0%{transform:scale(0.7);}70%{transform:scale(1.12);}100%{transform:scale(1);}}@keyframes fadeIn{from{opacity:0;}to{opacity:1;}}@keyframes bounceIn{0%{transform:scale(0) rotate(-20deg);opacity:0;}60%{transform:scale(1.25) rotate(5deg);opacity:1;}100%{transform:scale(1) rotate(0deg);}}@keyframes shake{0%,100%{transform:translateX(0);}18%{transform:translateX(-10px);}36%{transform:translateX(10px);}54%{transform:translateX(-8px);}72%{transform:translateX(8px);}88%{transform:translateX(-4px);}}.shaking{animation:shake 0.5s ease-out;}@keyframes winWiggle{0%{transform:rotate(0deg);}12%{transform:rotate(18deg);}28%{transform:rotate(-18deg);}44%{transform:rotate(18deg);}60%{transform:rotate(-18deg);}76%{transform:rotate(18deg);}90%{transform:rotate(-18deg);}100%{transform:rotate(0deg);}}@keyframes winTitleShake{0%{transform:rotate(0deg);}12%{transform:rotate(6deg);}28%{transform:rotate(-6deg);}44%{transform:rotate(6deg);}60%{transform:rotate(-6deg);}76%{transform:rotate(6deg);}90%{transform:rotate(-6deg);}100%{transform:rotate(0deg);}}.win-wiggle{animation:winWiggle 1.8s ease-in-out;}.win-title-shake{animation:winTitleShake 0.2s ease-in-out;}@keyframes memeShake{0%{transform:translate(0,0) rotate(0deg) scale(1);}10%{transform:translate(-6px,4px) rotate(-8deg) scale(1.10);}20%{transform:translate(6px,-4px) rotate(8deg) scale(1.15);}30%{transform:translate(-8px,5px) rotate(-10deg) scale(1.10);}40%{transform:translate(8px,-5px) rotate(10deg) scale(1.20);}50%{transform:translate(-5px,3px) rotate(-6deg) scale(1.10);}60%{transform:translate(5px,-3px) rotate(6deg) scale(1.15);}70%{transform:translate(-3px,2px) rotate(-3deg) scale(1.05);}80%{transform:translate(3px,-2px) rotate(3deg) scale(1.10);}90%{transform:translate(0,0) rotate(0deg) scale(1.05);}100%{transform:translate(0,0) rotate(0deg) scale(1);}}@keyframes flash{0%{color:#ff3b3b;text-shadow:0 0 10px #ff3b3b,0 0 30px #ff0000;}25%{color:#00ffea;text-shadow:0 0 10px #00ffea,0 0 30px #00ffaa;}50%{color:#ffff00;text-shadow:0 0 10px #ffff00,0 0 30px #ffcc00;}75%{color:#ff00ff;text-shadow:0 0 10px #ff00ff,0 0 30px #cc00ff;}100%{color:#ff3b3b;text-shadow:0 0 10px #ff3b3b,0 0 30px #ff0000;}}#win-67-display{font-family:'Fredoka','Arial Black',Arial,sans-serif;font-size:clamp(5rem,22vw,9rem);font-weight:400;letter-spacing:4px;color:#ff3b3b;text-shadow:0 0 10px #ff3b3b,0 0 30px #ff0000;display:inline-block;margin-bottom:10px;}#win-67-display.win-active{animation:memeShake 1s ease-in-out,flash 1s linear;}.diff-row{display:flex;gap:5px;margin-bottom:22px;background:#111128;border-radius:16px;padding:5px;border:2px solid #222244;}.diff-btn{padding:8px 16px;border-radius:11px;border:none;background:transparent;color:#445;font-size:0.9rem;font-weight:700;cursor:pointer;font-family:inherit;transition:all 0.15s;letter-spacing:0.5px;}.diff-btn:hover{color:#aaa;}.diff-btn.active{background:linear-gradient(135deg,#4d96ff,#3370cc);color:white;box-shadow:0 3px 10px rgba(77,150,255,0.3);}.equation-area.mode-hard{max-width:500px;gap:8px;}.equation-area.mode-harder{max-width:580px;gap:6px;padding:14px 16px;}.equation-area.mode-hard .slot{width:64px;height:64px;font-size:1.55rem;}.equation-area.mode-hard .op-slot{width:50px;height:50px;font-size:1.8rem;}.equation-area.mode-harder .slot{width:56px;height:56px;font-size:1.35rem;}.equation-area.mode-harder .op-slot{width:42px;height:42px;font-size:1.6rem;}.numbers-grid.cols-4{grid-template-columns:repeat(4,1fr);}.numbers-grid.cols-5{grid-template-columns:repeat(5,1fr);}</style></head><body><canvas id="confetti-canvas"></canvas><div class="title">67</div><div class="subtitle">make it equal 67, no cap 🔥</div><div class="diff-row"><button class="diff-btn active" id="diff-easy"   onclick="setDifficulty('easy')">easy</button><button class="diff-btn"        id="diff-hard"   onclick="setDifficulty('hard')">hard</button><button class="diff-btn"        id="diff-harder" onclick="setDifficulty('harder')">harder 💀</button></div><div class="equation-area mode-easy" id="equation-area"></div><div class="section-label" id="label-numbers">pick 2 numbers</div><div class="numbers-grid" id="numbers-grid"></div><div class="section-label" id="label-ops">pick an operator</div><div class="operators-row"><div class="op-tile" id="op-plus"  onclick="selectOp('+')">+</div><div class="op-tile" id="op-minus" onclick="selectOp('−')">−</div></div><div class="btn-row"><button class="btn btn-clear" onclick="clearAll()">clear ✕</button><button class="btn btn-play"  onclick="newGame()">new game 🔄</button></div><div class="overlay" id="win-overlay"><div id="win-67-display">67</div><div class="overlay-emoji" id="win-emoji">🔥</div><div class="overlay-title win-title" id="win-title">NO CAP THAT'S 67!</div><div class="overlay-sub" id="win-sub">you're literally built different fr fr</div><div class="overlay-btns"><button class="btn btn-play" onclick="newGame(); hideOverlay('win-overlay')">play again 🎮</button></div></div><div class="overlay" id="fail-overlay"><div class="overlay-emoji">💀</div><div class="overlay-title fail-title" id="fail-title">SIGMA… THAT AIN'T 67</div><div class="overlay-sub" id="fail-sub">big L, try again bestie</div><div class="overlay-btns"><button class="btn btn-clear" onclick="clearAll(); hideOverlay('fail-overlay')">try again</button><button class="btn btn-play"  onclick="newGame(); hideOverlay('fail-overlay')">new game 🔄</button></div></div><script>let numbers = [];

function generateSolution(numCount) {
for (let attempt = 0; attempt < 100; attempt++) {
const nums = [];
for (let i = 0; i < numCount - 1; i++) {
nums.push(Math.floor(Math.random() * 49) + 1);
}
let running = nums[0];
for (let i = 1; i < numCount - 1; i++) {
running = Math.random() < 0.5 ? running + nums[i] : running - nums[i];
if (Math.abs(running) > 200) break;
}
const lastOp = Math.random() < 0.5 ? '+' : '−';
const last = lastOp === '+' ? 67 - running : running - 67;
if (last < 1 || last >= 100) continue;
nums.push(last);
if (new Set(nums).size !== nums.length) continue;
if (nums.some(v => v < 1 || v >= 100)) continue;
return nums;
}
return null;
}
function generateNumbers() {
const cfg = diffCfg();
const usedValues = new Set();
const tiles = [];
let id = 0;
const addVal = (v) => {
if (!usedValues.has(v) && v > 0 && v < 100) {
tiles.push({ id: id++, value: v });
usedValues.add(v);
return true;
}
return false;
};
const sol = generateSolution(cfg.numCount);
if (sol) sol.forEach(v => addVal(v));
let att = 0;
while (tiles.length < cfg.tileCount && att++ < 300) {
addVal(Math.floor(Math.random() * 97) + 1);
}
for (let i = tiles.length - 1; i > 0; i--) {
const j = Math.floor(Math.random() * (i + 1));
[tiles[i], tiles[j]] = [tiles[j], tiles[i]];
}
return tiles;
}
const COLORS = ['color-0','color-1','color-2','color-3','color-4','color-5'];

if (i < cfg.numCount - 1) {

const opSpan = document.createElement('span');

const ox = document.createElement('div');

ox.textContent = '✕';
ox.onclick = () => clearOpSlot(i);
opSlot.appendChild(opSpan);
opSlot.appendChild(ox);
ea.appendChild(opSlot);
}
}
const eq = document.createElement('div');
eq.className = 'eq-equals';
eq.textContent = '=';
ea.appendChild(eq);
const tgt = document.createElement('div');
tgt.className = 'eq-target';
tgt.textContent = '67';
ea.appendChild(tgt);
}
function renderNumbers() {
const cfg = diffCfg();
const grid = document.getElementById('numbers-grid');
const colClass = cfg.numCount === 4 ? 'cols-5' : cfg.numCount === 3 ? 'cols-4' : '';
grid.className = `numbers-grid ${colClass}`;
grid.innerHTML = '';
numbers.forEach((n, i) => {
const tile = document.createElement('div');
tile.className = `number-tile ${COLORS[i % COLORS.length]}`;
tile.id = `num-tile-${n.id}`;
tile.textContent = n.value;
tile.onclick = () => selectNumber(n.id);
grid.appendChild(tile);
});
}
function updateLabels() {
const cfg = diffCfg();
const opCount = cfg.numCount - 1;
document.getElementById('label-numbers').textContent = `pick ${cfg.numCount} numbers`;
document.getElementById('label-ops').textContent =
`pick ${opCount} operator${opCount > 1 ? 's' : ''}`;
}
function renderSlots() {
const cfg = diffCfg();
for (let i = 0; i < cfg.numCount; i++) {
const slot = document.getElementById(`slot-num-${i}`);
const span = document.getElementById(`val-num-${i}`);
if (!slot || !span) continue;
if (selected.nums[i] !== null) {
span.textContent = numById(selected.nums[i]).value;
slot.classList.add('filled');
} else {
span.textContent = '?';
slot.classList.remove('filled');
}
}
for (let i = 0; i < cfg.numCount - 1; i++) {
const slot = document.getElementById(`slot-op-${i}`);
const span = document.getElementById(`val-op-${i}`);
if (!slot || !span) continue;
if (selected.ops[i] !== null) {
span.textContent = selected.ops[i];
slot.classList.add('filled');
} else {
span.textContent = '?';
slot.classList.remove('filled');
}
}
numbers.forEach(n => {

if (!tile) return;
const inUse = selected.nums.includes(n.id);
tile.classList.toggle('used', inUse);
tile.classList.toggle('selected', inUse);
});
document.getElementById('op-plus').classList.toggle('selected', selected.ops.some(op => op === '+'));

document.getElementById('op-plus').classList.remove('used');
document.getElementById('op-minus').classList.remove('used');
}
function selectNumber(id) {
const cfg = diffCfg();
const existingIdx = selected.nums.indexOf(id);
if (existingIdx !== -1) {
selected.nums[existingIdx] = null;
renderSlots();
return;
}
for (let i = 0; i < cfg.numCount; i++) {
if (selected.nums[i] === null) {
selected.nums[i] = id;
renderSlots();
maybeCheck();
return;
}
}
selected.nums[cfg.numCount - 1] = id;
renderSlots();
maybeCheck();
}
function selectOp(op) {
const cfg = diffCfg();
const opCount = cfg.numCount - 1;
for (let i = 0; i < opCount; i++) {
if (selected.ops[i] === null) {
selected.ops[i] = op;
renderSlots();
maybeCheck();
return;
}
}
}
function clearNumSlot(i) {
selected.nums[i] = null;
renderSlots();
}
function clearOpSlot(i) {
selected.ops[i] = null;

function clearAll() {

nums: Array(cfg.numCount).fill(null),
ops: Array(cfg.numCount - 1).fill(null),

renderSlots();
}
function maybeCheck() {
const cfg = diffCfg();
if (selected.nums.some(n => n === null)) return;
if (selected.ops.some(op => op === null)) return;
let result = numById(selected.nums[0]).value;
for (let i = 0; i < cfg.numCount - 1; i++) {
const b = numById(selected.nums[i + 1]).value;
result = selected.ops[i] === '+' ? result + b : result - b;
}
if (result === 67) {
setTimeout(showWin, 220);
} else {
setTimeout(() => showFail(result), 220);
}
}
function showWin() {
const msg = WIN_MSGS[Math.floor(Math.random() * WIN_MSGS.length)];
const emoji = document.getElementById('win-emoji');
const title = document.getElementById('win-title');
const display = document.getElementById('win-67-display');
emoji.textContent = msg.emoji;
title.textContent = msg.title;
document.getElementById('win-sub').textContent = msg.sub;
document.getElementById('win-overlay').classList.add('show');
display.classList.remove('win-active');
void display.offsetWidth;
display.classList.add('win-active');
emoji.classList.remove('win-wiggle');
title.classList.remove('win-title-shake');
void emoji.offsetWidth;
emoji.classList.add('win-wiggle');
void title.offsetWidth;
title.classList.add('win-title-shake');
launchConfetti();
}
function showFail(got) {
const msg = FAIL_MSGS[Math.floor(Math.random() * FAIL_MSGS.length)];
document.getElementById('fail-title').textContent = msg.title;
document.getElementById('fail-sub').textContent = `${msg.sub} (you got ${got})`;
document.getElementById('fail-overlay').classList.add('show');
const eq = document.getElementById('equation-area');
eq.classList.remove('shaking');
void eq.offsetWidth; 
eq.classList.add('shaking');
setTimeout(() => eq.classList.remove('shaking'), 520);
}
function hideOverlay(id) {
document.getElementById(id).classList.remove('show');
}
function setDifficulty(d) {
difficulty = d;
document.querySelectorAll('.diff-btn').forEach(b => b.classList.remove('active'));
document.getElementById(`diff-${d}`).classList.add('active');
newGame();
}
function newGame() {
const cfg = diffCfg();
numbers = generateNumbers();
selected = {
nums: Array(cfg.numCount).fill(null),
ops: Array(cfg.numCount - 1).fill(null),
};
buildEquationArea();
renderNumbers();
renderSlots();
updateLabels();
}
function numById(id) {
return numbers.find(n => n.id === id);
}
function launchConfetti() {
const canvas = document.getElementById('confetti-canvas');
const ctx = canvas.getContext('2d');
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;
const pieces = Array.from({ length: 160 }, () => ({
x: Math.random() * canvas.width,
y: -20 - Math.random() * 60,
w: Math.random() * 10 + 5,
h: Math.random() * 14 + 6,
color:`hsl(${Math.random()*360},90%,65%)`,
vx: (Math.random() - 0.5) * 5,
vy: Math.random() * 3 + 2,
rot: Math.random() * Math.PI * 2,
vrot: (Math.random() - 0.5) * 0.18,
life: 1,
}));
function animate() {
ctx.clearRect(0, 0, canvas.width, canvas.height);
let alive = false;
pieces.forEach(p => {
p.x += p.vx;
p.y += p.vy;
p.vy += 0.08;
p.rot += p.vrot;
p.life -= 0.004;
if (p.y < canvas.height + 20 && p.life > 0) {
alive = true;
ctx.save();
ctx.translate(p.x, p.y);
ctx.rotate(p.rot);
ctx.globalAlpha = Math.max(0, p.life);
ctx.fillStyle = p.color;
ctx.fillRect(-p.w / 2, -p.h / 2, p.w, p.h);
ctx.restore();
}
});
if (alive) requestAnimationFrame(animate);
else ctx.clearRect(0, 0, canvas.width, canvas.height);
}
animate();
}
newGame();
</script></body></html>
