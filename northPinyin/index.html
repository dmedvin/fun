     Pop the balloon with the correct <strong>English meaning</strong>!<br><br>

     🏆 Reach <strong>10 points</strong> to win!</p><button class="green" onclick="startGame()">Let's Play!</button></div><div id="win-screen" class="screen" style="display:none"><h1>🎉 You Win!</h1><p id="win-msg"></p><button class="green" onclick="startGame()">Play Again</button></div><div id="lose-screen" class="screen" style="display:none"><h1>😢 Try Again!</h1><p id="lose-msg"></p><button class="red" onclick="startGame()">Retry</button></div><div id="hud"><span id="score-el">⭐ 0</span><div id="speed-control"><span title="Slower">🐢</span><input type="range" id="speed-slider" min="0" max="4" step="0.1" value="2"><span title="Faster">🐇</span></div><div id="autoread-control"><input type="checkbox" id="autoread-toggle"><label for="autoread-toggle">🔊 Auto-read</label></div><span id="round-el">Round 1</span></div><div id="question-area"><div id="prompt">What does this mean?</div><div id="chinese-char">?</div></div><div id="game-area"></div><div id="feedback"></div><script>const VOCAB = [

const COLORS = [
'#FF6B6B', '#FF9F43', '#FECA57', '#48DBFB',
'#FF9FF3', '#54A0FF', '#A29BFE', '#00D2D3',
'#1DD1A1', '#FF6348',
];
const BALLOONS_PER_ROUND = 8;
const WIN_SCORE = 10;
const LOSE_SCORE = -5;
const SPEED_SLOW = 20;
const SPEED_FAST = 10;
let score = 0;
let round = 0;
let active = false;
let timers = [];
let lastIdx = -1;
const $ = id => document.getElementById(id);
const rnd = (a, b) => Math.random() * (b - a) + a;
function shuffle(arr) {
const a = [...arr];
for (let i = a.length - 1; i > 0; i--) {
const j = Math.floor(Math.random() * (i + 1));
[a[i], a[j]] = [a[j], a[i]];
}
return a;
}
const audio = new (window.AudioContext || window.webkitAudioContext)();
function speakChinese(text) {
if (!window.speechSynthesis) return;
window.speechSynthesis.cancel();
const utter = new SpeechSynthesisUtterance(text);
utter.lang = 'zh-CN';
utter.rate = 0.85;
window.speechSynthesis.speak(utter);
}
function playWrong() {
if (audio.state === 'suspended') audio.resume();
[[247, 0], [220, 0.1]].forEach(([freq, when]) => {
const osc = audio.createOscillator();
const gain = audio.createGain();
osc.connect(gain);
gain.connect(audio.destination);
osc.type = 'sawtooth';
osc.frequency.value = freq;
const t = audio.currentTime + when;
gain.gain.setValueAtTime(0.2, t);
gain.gain.exponentialRampToValueAtTime(0.001, t + 0.18);
osc.start(t);
osc.stop(t + 0.18);
});
}
function shiftColor(hex, delta) {
const n = parseInt(hex.slice(1), 16);
const r = Math.min(255, Math.max(0, (n >> 16) + delta));
const g = Math.min(255, Math.max(0, ((n >> 8) & 0xFF) + delta));
const b = Math.min(255, Math.max(0, (n & 0xFF) + delta));
return `rgb(${r},${g},${b})`;
}
function updateHUD() {
$('score-el').textContent = `⭐ ${score}`;
$('round-el').textContent = `Round ${round}`;
}
function flash(text, color) {
const el = $('feedback');
el.style.animation = 'none';
el.textContent = text;
el.style.color = color;
void el.offsetWidth;
el.style.animation = 'feedAnim 0.9s forwards';
}
function clearBalloons() {
timers.forEach(clearTimeout);
timers = [];
$('game-area').innerHTML = '';
}
function speedFactor() {
const v = parseFloat($('speed-slider').value);
return v <= 2
? Math.pow(2, (2 - v) / 2)
: Math.pow(2, 2 - v);
}
document.addEventListener('DOMContentLoaded', () => {
$('speed-slider').addEventListener('input', () => {
const factor = speedFactor();
document.querySelectorAll('.b-outer[data-base-dur]').forEach(el => {
el.style.animationDuration = (parseFloat(el.dataset.baseDur) * factor) + 's';
});
});
});
function columnPositions(n) {
const BALLOON_W = 120;
const PAD = 8;
const usable = window.innerWidth - PAD * 2 - BALLOON_W;
const slot = usable / n;
const positions = Array.from({ length: n }, (_, i) => {
const slotLeft = PAD + i * slot;
const jitter = rnd(-slot * 0.15, slot * 0.15);
return Math.round(slotLeft + slot / 2 - BALLOON_W / 2 + jitter);
});
return shuffle(positions);
}
function spawnBalloon(word, isCorrect, delay, leftPx) {
const t = setTimeout(() => {
if (!active) return;
const color = COLORS[Math.floor(Math.random() * COLORS.length)];
const baseDur = rnd(SPEED_FAST, SPEED_SLOW);
const dur = baseDur * speedFactor();
const outer = document.createElement('div');
outer.className = 'b-outer';
outer.dataset.baseDur = baseDur;
outer.style.left = leftPx + 'px';
outer.style.animationDuration = dur + 's';
const body = document.createElement('div');
body.className = 'b-body';
body.style.background = `radial-gradient(circle at 35% 30%, ${shiftColor(color, 70)} 0%, ${color} 70%)`;
body.style.setProperty('--c', color);
const wordEl = document.createElement('span');
wordEl.className = 'b-word';
wordEl.textContent = word;
const knot = document.createElement('div');
knot.className = 'b-knot';
knot.style.background = shiftColor(color, -50);
const string = document.createElement('div');
string.className = 'b-string';
body.appendChild(wordEl);
outer.appendChild(body);
outer.appendChild(knot);
outer.appendChild(string);
outer.addEventListener('pointerdown', e => {
e.preventDefault();
handleClick(outer, body, isCorrect, word);
});
if (isCorrect) {
outer.addEventListener('animationend', e => {
if (e.animationName !== 'floatUp' || !active) return;
flash('Missed! −1', '#FF4757');
addScore(-1);
endRound();
});
}
$('game-area').appendChild(outer);
}, delay);
timers.push(t);
}
function handleClick(outer, body, isCorrect, word) {
if (!active) return;
outer.style.animationPlayState = 'paused';
body.style.animation = 'pop 0.3s forwards';
if (isCorrect) {
speakChinese($('chinese-char').textContent);
flash('+1 ✓', '#20bf6b');
addScore(+1);
endRound();
} else {
playWrong();
flash('−1 ✗', '#FF4757');
addScore(-1);
}
}
function addScore(delta) {
score += delta;
updateHUD();
if (score >= WIN_SCORE) { active = false; setTimeout(showWin, 500); }
if (score <= LOSE_SCORE) { active = false; setTimeout(showLose, 500); }
}
function endRound() {
if (!active) return;
active = false;
setTimeout(startRound, 700);
}
function startRound() {
if (score >= WIN_SCORE || score <= LOSE_SCORE) return;
clearBalloons();
active = true;
round++;
updateHUD();
let idx;
do { idx = Math.floor(Math.random() * VOCAB.length); } while (idx === lastIdx);
lastIdx = idx;
const q = VOCAB[idx];
$('chinese-char').textContent = q.zh;
if ($('autoread-toggle').checked) speakChinese(q.zh);
const distractors = shuffle(VOCAB.filter(v => v.en !== q.en))
.slice(0, BALLOONS_PER_ROUND - 1)
.map(v => v.en);
const words = shuffle([q.en, ...distractors]);
const positions = columnPositions(words.length);
words.forEach((word, i) => {
spawnBalloon(word, word === q.en, i * rnd(280, 650), positions[i]);
});
}
function startGame() {
score = 0; round = 0; lastIdx = -1;
clearBalloons();
['start-screen', 'win-screen', 'lose-screen'].forEach(id => $(id).style.display = 'none');
$('hud').style.display = 'flex';
$('question-area').style.display = 'block';
updateHUD();
startRound();
}
function showWin() {
clearBalloons();
$('hud').style.display = $('question-area').style.display = 'none';
$('win-msg').textContent = `You finished ${round} rounds! 太棒了！(Excellent!)`;
$('win-screen').style.display = 'flex';
}
function showLose() {
clearBalloons();
$('hud').style.display = $('question-area').style.display = 'none';
$('lose-msg').textContent = `Score dropped to ${score}. Keep practicing! 加油！`;
$('lose-screen').style.display = 'flex';
}</script></body></html>
